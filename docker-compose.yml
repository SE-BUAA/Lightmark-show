services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lightmark-backend
    environment:
      SERVER_PORT: 8080

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-lightmark}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-lightmark}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-120}

      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://api.deepseek.com/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://newapi.stuhelper.com/v1}
      LIGHTMARK_AI_API_URL: ${LIGHTMARK_AI_API_URL:-${AI_API_URL:-https://api.deepseek.com/chat/completions}}
      LIGHTMARK_AI_API_KEY: ${LIGHTMARK_AI_API_KEY:-${AI_API_KEY:-}}
      LIGHTMARK_AI_MODEL: ${LIGHTMARK_AI_MODEL:-${AI_MODEL:-deepseek-v4-flash}}
      LIGHTMARK_DEEPSEEK_BASE_URL: ${LIGHTMARK_DEEPSEEK_BASE_URL:-${DEEPSEEK_BASE_URL:-https://newapi.stuhelper.com/v1}}
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - lightmark-net

  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lightmark-frontend-builder
    command: ["sh", "-c", "echo frontend build done"]
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: lightmark-nginx
    depends_on:
      - backend
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /home/ubuntu/certs/origin.crt:/etc/nginx/certs/origin.crt:ro
      - /home/ubuntu/certs/origin.key:/etc/nginx/certs/origin.key:ro
    restart: unless-stopped
    networks:
      - lightmark-net

networks:
  lightmark-net:
    driver: bridge
