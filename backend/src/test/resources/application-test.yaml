spring:
  datasource:
    url: jdbc:h2:mem:timemark;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

timemark:
  jwt:
    secret: TestSecretKeyForJwtSigning12345678901234567890
    expire-hours: 12
  membership:
    levels:
      - level: 0
        points-threshold: 0
        benefits: []
      - level: 1
        points-threshold: 100
        benefits:
          - VIP 折扣
          - 积分加成
      - level: 2
        points-threshold: 500
        benefits:
          - 更高折扣
          - 专属客服
      - level: 3
        points-threshold: 1000
        benefits:
          - 最高折扣
          - 专属客服
          - 生日礼包
